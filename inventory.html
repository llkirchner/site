  :root{
    --bg:#253649; --bg2:#2e415a; --card:#2b3d52; --card2:#374d66;
    --line:#42586f; --ink:#f4f1ea; --muted:#bdc9d6; --dim:#8ea1b4;
    --red:#e0708f; --reddeep:#863955; --gold:#e2a3b8; --green:#8fd096;
    --amber:#eec26a; --warnbg:#ffd23f; --warnink:#1a1200;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:'Lato',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:17px; line-height:1.35;}
  h1,h2,h3,.serif{font-weight:700;}
  button{font-family:inherit;}
  input,select,textarea{font-family:inherit;font-size:17px;color:var(--ink);
    background:var(--bg2);border:1px solid var(--line);border-radius:10px;
    padding:12px;width:100%;}
  input:focus,select:focus{outline:2px solid var(--gold);border-color:var(--gold);}
  label{display:block;font-size:14px;color:var(--muted);margin:14px 0 5px;
    text-transform:uppercase;letter-spacing:.06em;}

  /* ---- save warning bar ---- */
  #saveWarn{display:none;position:fixed;top:0;left:0;right:0;z-index:400;
    background:var(--warnbg);color:var(--warnink);font-weight:700;font-size:15px;
    padding:calc(env(safe-area-inset-top) + 10px) 14px 10px;text-align:center;
    box-shadow:0 3px 12px rgba(0,0,0,.6);}
  body.savefail #saveWarn{display:block;}
  body.savefail{padding-top:70px;}

  /* ---- header ---- */
  header{padding:calc(env(safe-area-inset-top) + 10px) 16px 8px;
    display:flex;align-items:baseline;justify-content:space-between;
    border-bottom:1px solid var(--line);background:var(--bg);}
  header .brand h1{margin:0;font-size:24px;color:var(--ink);font-weight:700;letter-spacing:.01em;}
  header .brand .tag{font-size:12.5px;color:var(--gold);font-style:italic;margin-top:1px;}
  header .bkbtn{background:none;border:1px solid var(--line);color:var(--muted);
    border-radius:9px;padding:8px 12px;font-size:14px;}

  main{padding:14px 14px calc(110px + env(safe-area-inset-bottom));max-width:640px;margin:0 auto;}
  .view{display:none;} .view.active{display:block;}

  /* ---- bottom nav ---- */
  nav{position:fixed;bottom:0;left:0;right:0;z-index:300;background:#1e2c3c;
    border-top:1px solid var(--line);display:flex;align-items:flex-end;
    padding:6px 4px calc(6px + env(safe-area-inset-bottom));}
  nav button{flex:1;background:none;border:none;color:var(--dim);font-size:10.5px;
    display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0 4px;min-height:56px;justify-content:flex-end;}
  nav button .ic{font-size:22px;line-height:1;}
  nav button.center .ic{font-size:33px;background:var(--reddeep);color:var(--ink);
    width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    margin-bottom:3px;box-shadow:0 4px 12px rgba(0,0,0,.5);border:2px solid #42586f;}
  nav button.on{color:var(--gold);font-weight:700;}
  nav button.center.on .ic{background:var(--red);}

  /* ---- cards & buttons ---- */
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:14px;margin-bottom:12px;}
  .bigbtn{display:block;width:100%;background:var(--reddeep);color:var(--ink);
    border:none;border-radius:12px;padding:15px;font-size:17px;font-weight:700;margin:4px 0 14px;}
  .bigbtn:active{background:var(--red);}
  .ghost{background:none;border:1px dashed var(--dim);color:var(--muted);
    border-radius:10px;padding:11px;width:100%;font-size:15px;}
  .mini{background:var(--card2);border:1px solid var(--line);color:var(--ink);
    border-radius:9px;padding:10px 13px;font-size:14.5px;font-weight:600;}
  .danger{background:none;border:1px solid var(--reddeep);color:var(--red);
    border-radius:10px;padding:12px;width:100%;font-size:15px;}
  .row{display:flex;gap:8px;align-items:center;}
  .grow{flex:1;}
  .sub{color:var(--muted);font-size:14px;}
  .tiny{color:var(--dim);font-size:12.5px;}
  .right{text-align:right;}
  .statline{color:var(--muted);font-size:14.5px;margin:2px 0 12px;}

  /* format rows in book card */
  .fmt{border-top:1px solid var(--line);padding:10px 0;}
  .fmt:first-of-type{border-top:none;}
  .badge{display:inline-block;min-width:46px;text-align:center;border-radius:8px;
    padding:5px 8px;font-weight:800;font-size:15px;}
  .b-ok{background:#1f4030;color:var(--green);}
  .b-low{background:#483b1c;color:var(--amber);}
  .b-out{background:#4a2337;color:var(--red);}

  /* sell tiles */
  .tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:13px;
    padding:12px;text-align:left;color:var(--ink);min-height:104px;
    display:flex;flex-direction:column;justify-content:space-between;}
  .tile:active{background:var(--card2);border-color:var(--gold);}
  .tile.out{opacity:.45;}
  .tile .t{font-weight:700;font-size:15.5px;}
  .tile .p{color:var(--gold);font-weight:800;font-size:17px;}
  .tile .qp{color:var(--red);font-size:13px;text-decoration:underline;padding:6px 0 0;background:none;border:none;text-align:left;}

  .saleline{display:flex;align-items:center;gap:8px;padding:9px 0;border-top:1px solid var(--line);font-size:15px;}
  .x{background:none;border:1px solid var(--line);color:var(--red);border-radius:8px;
    padding:6px 11px;font-size:14px;}

  /* modal sheet */
  #ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;}
  #ovl.open{display:block;}
  #sheet{position:fixed;left:0;right:0;bottom:0;max-height:88vh;overflow-y:auto;
    background:var(--bg2);border-radius:18px 18px 0 0;padding:18px 16px calc(24px + env(safe-area-inset-bottom));
    z-index:501;border-top:2px solid var(--line);max-width:640px;margin:0 auto;}
  #sheet h2{margin:0 0 4px;font-size:21px;}
  .calc{background:var(--card);border:1px solid var(--gold);border-radius:10px;
    padding:10px 12px;margin-top:14px;font-size:15px;color:var(--gold);}
  .split{background:var(--card);border:1px dashed var(--dim);border-radius:10px;padding:10px 12px;margin-top:8px;}

  /* toast */
  #toast{display:none;position:fixed;left:12px;right:12px;bottom:calc(104px + env(safe-area-inset-bottom));
    z-index:600;background:#141f2b;border:1px solid var(--gold);border-radius:12px;
    padding:13px 14px;font-size:15.5px;box-shadow:0 6px 20px rgba(0,0,0,.7);
    align-items:center;gap:10px;max-width:616px;margin:0 auto;}
  #toast.show{display:flex;}
  #toast button{background:var(--gold);color:#2a1420;border:none;border-radius:8px;
    padding:9px 16px;font-weight:800;font-size:15px;}

  /* ledger */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;}
  .stat .n{font-size:22px;font-weight:700;color:var(--ink);}
  .stat .l{font-size:12.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}
  table{width:100%;border-collapse:collapse;font-size:14.5px;}
  th{color:var(--dim);text-align:left;font-size:12px;text-transform:uppercase;
    letter-spacing:.05em;padding:6px 4px;border-bottom:1px solid var(--line);}
  td{padding:8px 4px;border-bottom:1px solid var(--line);}
  td.r,th.r{text-align:right;}
  .secthead{margin:22px 0 8px;font-size:17px;color:var(--gold);}
  .back{background:none;border:none;color:var(--gold);font-size:16px;padding:6px 0 12px;font-weight:700;}
</style>
</head>
<body>

<div id="saveWarn">⚠️ This page can’t save your data on this device. Anything you enter will be LOST. Try opening it in Safari (not private browsing).</div>

<header>
  <div class="brand">
    <h1>The Book Racket</h1>
    <div class="tag">You like it twisted? You’re in the right place.</div>
  </div>
  <button class="bkbtn" onclick="exportBackup()">Backup&nbsp;⬇</button>
</header>

<main>
  <section id="v-books" class="view"></section>
  <section id="v-events" class="view"></section>
  <section id="v-give" class="view"></section>
  <section id="v-consign" class="view"></section>
  <section id="v-ledger" class="view"></section>
</main>

<nav>
  <button id="nb-events" onclick="go('events')"><span class="ic">🗓️</span>Events</button>
  <button id="nb-give" onclick="go('give')"><span class="ic">🎁</span>Giveaways</button>
  <button id="nb-books" class="center" onclick="go('books')"><span class="ic">📚</span>Books</button>
  <button id="nb-consign" onclick="go('consign')"><span class="ic">🏪</span>Consign</button>
  <button id="nb-ledger" onclick="go('ledger')"><span class="ic">🧾</span>Ledger</button>
</nav>

<div id="ovl" onclick="closeSheet(event)"><div id="sheet" onclick="event.stopPropagation()"></div></div>
<div id="toast"><span id="toastMsg" class="grow"></span><button id="toastBtn">UNDO</button></div>
<input type="file" id="restoreFile" accept=".json,application/json" style="display:none">

<script>
"use strict";
/* ================= storage & safety ================= */
var KEY = "llk_racket_v1";
var S = null;               // app state
var saveOK = true;

function warnBar(){ document.body.classList.add("savefail"); }

function selfTest(){
  try{
    localStorage.setItem("__llk_test__","ok");
    if(localStorage.getItem("__llk_test__") !== "ok") throw 0;
    localStorage.removeItem("__llk_test__");
  }catch(e){ saveOK=false; warnBar(); }
}

function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(S)); }
  catch(e){ saveOK=false; warnBar(); }
}

function load(){
  try{
    var raw = localStorage.getItem(KEY);
    if(raw){ S = JSON.parse(raw); }
  }catch(e){ S = null; }
  if(!S || !S.books){ S = seed(); save(); }
  // forward-compat defaults
  S.events = S.events||[]; S.shops = S.shops||[]; S.placements = S.placements||[];
  S.sales = S.sales||[]; S.giveaways = S.giveaways||[];
}

function seed(){
  var titles = ["American Lady Creature","Blissful Thinking","Florida Girls",
                "Vegas Girls","Havana Girls","Steel City Burn","The Critic"];
  var books = titles.map(function(t,i){
    return {id:"b"+(i+1), title:t, format:"Paperback", copies:0,
            wholesale:0, taxship:0, retail:0};
  });
  return {books:books, events:[], shops:[], placements:[], sales:[], giveaways:[]};
}

/* ================= helpers ================= */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function num(v){ var n=parseFloat(v); return isNaN(n)?0:n; }
function $(id){ return document.getElementById(id); }
function fmt(n){ n=num(n); return "$"+n.toFixed(2); }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function bookById(id){ for(var i=0;i<S.books.length;i++) if(S.books[i].id===id) return S.books[i]; return null; }
function bookCost(b){ return num(b.wholesale)+num(b.taxship); }
function fmtDate(d){
  if(!d) return "";
  var p=d.split("-");
  if(p.length===3) return ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][+p[1]-1]+" "+(+p[2])+", "+p[0];
  return d;
}
function shortFmt(f){
  return {Paperback:"Pb", Hardcover:"Hc", Signed:"Signed", "Special edition":"Special"}[f]||f;
}
function placedQty(shopId, bookId){
  for(var i=0;i<S.placements.length;i++)
    if(S.placements[i].shopId===shopId && S.placements[i].bookId===bookId) return S.placements[i].qty;
  return 0;
}
function setPlaced(shopId, bookId, qty){
  for(var i=0;i<S.placements.length;i++){
    var p=S.placements[i];
    if(p.shopId===shopId && p.bookId===bookId){
      p.qty=qty;
      if(qty<=0) S.placements.splice(i,1);
      return;
    }
  }
  if(qty>0) S.placements.push({shopId:shopId, bookId:bookId, qty:qty});
}

/* ================= navigation ================= */
var VIEW="books", curEvent=null, curShop=null;
function go(v){
  VIEW=v; curEvent=null; curShop=null;
  render();
}
function render(){
  ["books","events","give","consign","ledger"].forEach(function(v){
    $("v-"+v).classList.toggle("active", v===VIEW);
    $("nb-"+v).classList.toggle("on", v===VIEW);
  });
  if(VIEW==="books") rBooks();
  if(VIEW==="events") rEvents();
  if(VIEW==="give") rGive();
  if(VIEW==="consign") rConsign();
  if(VIEW==="ledger") rLedger();
  window.scrollTo(0,0);
}

/* ================= sheet (modal) ================= */
function openSheet(html){ $("sheet").innerHTML=html; $("ovl").classList.add("open"); }
function closeSheet(ev){ if(!ev || ev.target===$("ovl")) $("ovl").classList.remove("open"); }
function dismissSheet(){ $("ovl").classList.remove("open"); }

/* ================= toast / undo ================= */
var toastTimer=null;
function toast(msg, undoFn){
  $("toastMsg").textContent=msg;
  var b=$("toastBtn");
  b.style.display = undoFn ? "" : "none";
  b.onclick = function(){ if(undoFn) undoFn(); hideToast(); };
  $("toast").classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(hideToast, 6000);
}
function hideToast(){ $("toast").classList.remove("show"); }

/* ================= BOOKS view ================= */
function rBooks(){
  var groups={}, order=[];
  S.books.forEach(function(b){
    var k=b.title.trim().toLowerCase();
    if(!groups[k]){ groups[k]=[]; order.push(k); }
    groups[k].push(b);
  });
  order.reverse(); // newest-added title first
  var totCopies=S.books.reduce(function(s,b){ return s+num(b.copies); },0);
  var h='<div class="statline">'+order.length+' title'+(order.length===1?'':'s')+' · '+totCopies+' copies on hand</div>';
  h+='<button class="bigbtn" onclick="bookForm(\'add\')">＋ Add a book</button>';
  order.forEach(function(k){
    var rows=groups[k], title=rows[0].title;
    h+='<div class="card"><h2 style="margin:0 0 6px;font-size:19px;">'+esc(title)+'</h2>';
    rows.forEach(function(b){
      var c=num(b.copies), cls=c===0?"b-out":(c<=2?"b-low":"b-ok");
      var cost=bookCost(b), profit=num(b.retail)-cost;
      h+='<div class="fmt">'
        +'<div class="row"><span class="badge '+cls+'">'+(c===0?"OUT":c)+'</span>'
        +'<div class="grow"><b>'+esc(b.format)+'</b><br><span class="tiny">'
        +(num(b.retail)>0 ? 'Retail '+fmt(b.retail)+' · cost '+fmt(cost)+' · profit '+fmt(profit)
                          : '<span style="color:var(--amber)">Tap Edit to set your price</span>')
        +'</span></div></div>'
        +'<div class="row" style="margin-top:9px;">'
        +'<button class="mini grow" onclick="bookForm(\'copies\',\''+b.id+'\')">＋ Add copies</button>'
        +'<button class="mini grow" onclick="bookForm(\'edit\',\''+b.id+'\')">Edit</button>'
        +'</div></div>';
    });
    h+='<button class="ghost" style="margin-top:10px;" onclick="bookForm(\'format\',\''+rows[0].id+'\')">＋ Add another format of this title</button>';
    h+='</div>';
  });
  $("v-books").innerHTML=h;
}

var FORMATS=["Paperback","Hardcover","Signed","Special edition"];

function bookForm(mode, id){
  var b = id ? bookById(id) : null;
  var title = mode==="add" ? "Add a book" : mode==="format" ? "Add another format" : mode==="copies" ? "Add copies" : "Edit book";
  var pre = {
    title: b ? b.title : "",
    format: (mode==="edit"||mode==="copies") && b ? b.format : "Paperback",
    copies: (mode==="edit"||mode==="copies") && b ? b.copies : "",
    wholesale: (mode==="edit"||mode==="copies") && b ? b.wholesale : "",
    taxship: (mode==="edit"||mode==="copies") && b ? b.taxship : "",
    retail: (mode==="edit"||mode==="copies") && b ? b.retail : ""
  };
  var opts=FORMATS.map(function(f){ return '<option'+(f===pre.format?' selected':'')+'>'+f+'</option>'; }).join("");
  var h='<h2>'+title+'</h2>';
  if(mode==="copies") h+='<div class="sub">'+esc(b.title)+' — '+esc(b.format)+'. Update the count (and costs if this batch cost you something different).</div>';
  h+='<label>Title</label><input id="f-title" value="'+esc(pre.title)+'" '+(mode==="format"||mode==="copies"||mode==="edit"?'':'placeholder="Book title"')+'>'
   +'<label>Format</label><select id="f-format">'+opts+'</select>'
   +'<label>Copies on hand</label><input id="f-copies" type="number" inputmode="numeric" min="0" step="1" value="'+esc(pre.copies)+'" placeholder="0">'
   +'<label>Wholesale (per book)</label><input id="f-ws" type="number" inputmode="decimal" min="0" step="0.01" value="'+esc(pre.wholesale)+'" placeholder="0.00 — free author copies = 0">'
   +'<label>Tax + shipping (per book)</label><input id="f-ts" type="number" inputmode="decimal" min="0" step="0.01" value="'+esc(pre.taxship)+'" placeholder="0.00">'
   +'<button class="qp tile-link" style="background:none;border:none;color:var(--gold);text-decoration:underline;font-size:14px;padding:8px 0 0;" onclick="toggleSplit()">Split a whole order…</button>'
   +'<div class="split" id="splitBox" style="display:none;">'
   +'<div class="tiny" style="margin-bottom:6px;">Enter the order’s total tax + shipping and how many books were in it — I’ll do the division.</div>'
   +'<label style="margin-top:4px;">Order’s tax + shipping total ($)</label><input id="f-splitTotal" type="number" inputmode="decimal" min="0" step="0.01">'
   +'<label>Books in the order</label><input id="f-splitCount" type="number" inputmode="numeric" min="1" step="1">'
   +'<button class="mini" style="margin-top:10px;width:100%;" onclick="applySplit()">Fill in per-book amount</button>'
   +'</div>'
   +'<label>Retail price (what you charge)</label><input id="f-retail" type="number" inputmode="decimal" min="0" step="0.01" value="'+esc(pre.retail)+'" placeholder="0.00">'
   +'<div class="calc" id="f-calc"></div>'
   +'<div class="row" style="margin-top:16px;">'
   +'<button class="mini grow" onclick="dismissSheet()">Cancel</button>'
   +'<button class="bigbtn grow" style="margin:0;" onclick="saveBook(\''+mode+'\',\''+(id||"")+'\')">Save</button>'
   +'</div>';
  if(mode==="edit") h+='<button class="danger" style="margin-top:14px;" onclick="deleteBook(\''+id+'\')">Delete this format</button>';
  openSheet(h);
  ["f-ws","f-ts","f-retail"].forEach(function(i){ $(i).addEventListener("input", calcLive); });
  calcLive();
  if(mode==="copies") setTimeout(function(){ $("f-copies").focus(); },50);
}
function toggleSplit(){ var s=$("splitBox"); s.style.display = s.style.display==="none" ? "block" : "none"; }
function applySplit(){
  var t=num($("f-splitTotal").value), c=num($("f-splitCount").value);
  if(c<1){ alert("How many books were in the order?"); return; }
  $("f-ts").value=(t/c).toFixed(2);
  calcLive();
}
function calcLive(){
  var ws=num($("f-ws").value), ts=num($("f-ts").value), r=num($("f-retail").value);
  var cost=ws+ts, profit=r-cost;
  $("f-calc").innerHTML="Cost per book: <b>"+fmt(cost)+"</b> &nbsp;·&nbsp; Profit per book: <b style='color:"+(profit>=0?"var(--green)":"var(--red)")+"'>"+fmt(profit)+"</b>";
}
function saveBook(mode, id){
  var t=$("f-title").value.trim(), f=$("f-format").value;
  if(!t){ alert("The book needs a title."); return; }
  var copies=Math.max(0, Math.round(num($("f-copies").value)));
  var ws=num($("f-ws").value), ts=num($("f-ts").value), r=num($("f-retail").value);
  if(mode==="edit"||mode==="copies"){
    var b=bookById(id);
    // if title/format changed, guard against duplicate
    var dup=S.books.some(function(o){ return o.id!==id && o.title.trim().toLowerCase()===t.toLowerCase() && o.format===f; });
    if(dup){ alert("You already have "+t+" in "+f+". Edit that one instead."); return; }
    b.title=t; b.format=f; b.copies=copies; b.wholesale=ws; b.taxship=ts; b.retail=r;
  } else {
    var dup2=S.books.some(function(o){ return o.title.trim().toLowerCase()===t.toLowerCase() && o.format===f; });
    if(dup2){ alert("You already have "+t+" in "+f+". Use Edit or Add copies on that row."); return; }
    S.books.push({id:uid(), title:t, format:f, copies:copies, wholesale:ws, taxship:ts, retail:r});
  }
  save(); dismissSheet(); render();
}
function deleteBook(id){
  var b=bookById(id);
  if(!confirm("Delete "+b.title+" ("+b.format+")? Past sales stay in the ledger.")) return;
  S.books=S.books.filter(function(o){ return o.id!==id; });
  S.placements=S.placements.filter(function(p){ return p.bookId!==id; });
  save(); dismissSheet(); render();
}

/* ================= EVENTS view ================= */
function rEvents(){
  if(curEvent){ rEventDetail(); return; }
  var h='<button class="bigbtn" onclick="eventForm()">＋ New event</button>';
  if(!S.events.length) h+='<div class="sub">No events yet. Create one, then tap tiles to sell.</div>';
  var evs=S.events.slice().sort(function(a,b){ return (b.date||"").localeCompare(a.date||""); });
  evs.forEach(function(ev){
    var sales=S.sales.filter(function(s){ return s.eventId===ev.id; });
    var n=sales.reduce(function(s,x){ return s+x.qty; },0);
    var rev=sales.reduce(function(s,x){ return s+x.qty*x.price; },0);
    h+='<div class="card" onclick="openEvent(\''+ev.id+'\')" style="cursor:pointer;">'
      +'<div class="row"><div class="grow"><b class="serif" style="font-size:18px;">'+esc(ev.name)+'</b>'
      +'<div class="sub">'+fmtDate(ev.date)+'</div></div>'
      +'<div class="right"><b style="color:var(--gold)">'+n+' sold</b><div class="sub">'+fmt(rev)+'</div></div></div></div>';
  });
  $("v-events").innerHTML=h;
}
function eventForm(){
  openSheet('<h2>New event</h2>'
    +'<label>Event name</label><input id="e-name" placeholder="e.g. St. Pete Book Fest">'
    +'<label>Date</label><input id="e-date" type="date" value="'+new Date().toISOString().slice(0,10)+'">'
    +'<div class="row" style="margin-top:16px;"><button class="mini grow" onclick="dismissSheet()">Cancel</button>'
    +'<button class="bigbtn grow" style="margin:0;" onclick="saveEvent()">Create</button></div>');
}
function saveEvent(){
  var n=$("e-name").value.trim();
  if(!n){ alert("Give the event a name."); return; }
  var ev={id:uid(), name:n, date:$("e-date").value};
  S.events.push(ev); save(); dismissSheet();
  curEvent=ev.id; render();
}
function openEvent(id){ curEvent=id; render(); }

function rEventDetail(){
  var ev=null;
  S.events.forEach(function(e){ if(e.id===curEvent) ev=e; });
  if(!ev){ curEvent=null; rEvents(); return; }
  var sales=S.sales.filter(function(s){ return s.eventId===ev.id; }).slice().reverse();
  var n=sales.reduce(function(s,x){ return s+x.qty; },0);
  var rev=sales.reduce(function(s,x){ return s+x.qty*x.price; },0);
  var h='<button class="back" onclick="go(\'events\')">‹ Events</button>'
    +'<h2 style="margin:0;">'+esc(ev.name)+'</h2>'
    +'<div class="statline">'+fmtDate(ev.date)+' &nbsp;·&nbsp; <b style="color:var(--gold)">'+n+' sold — '+fmt(rev)+'</b></div>'
    +'<div class="tiny" style="margin-bottom:10px;">Tap a tile = 1 sold at retail. Mis-tap? Hit UNDO.</div><div class="tiles">';
  var books=S.books.slice().reverse(); // newest first
  books.forEach(function(b){
    var out=num(b.copies)<=0;
    h+='<div class="tile'+(out?' out':'')+'" onclick="'+(out?'':'quickSale(\''+b.id+'\')')+'">'
      +'<div><div class="t">'+esc(b.title)+'</div><div class="tiny">'+esc(shortFmt(b.format))+' · '+(out?'OUT':num(b.copies)+' left')+'</div></div>'
      +'<div class="row"><span class="p grow">'+fmt(b.retail)+'</span></div>'
      +'<button class="qp" onclick="event.stopPropagation();saleForm(\''+b.id+'\')">Qty / price…</button>'
      +'</div>';
  });
  h+='</div>'
    +'<button class="ghost" style="margin-top:14px;" onclick="giveForm(\''+ev.id+'\')">🎁 Record a free giveaway</button>';
  if(sales.length){
    h+='<div class="secthead serif">Sales at this event</div>';
    sales.forEach(function(s){
      h+='<div class="saleline"><div class="grow">'+esc(s.title)+' <span class="tiny">'+esc(shortFmt(s.format))+'</span>'
        +'<div class="tiny">'+s.qty+' × '+fmt(s.price)+'</div></div>'
        +'<b>'+fmt(s.qty*s.price)+'</b>'
        +'<button class="x" onclick="removeSale(\''+s.id+'\')">✕</button></div>';
    });
  }
  $("v-events").innerHTML=h;
}

function makeSale(bookId, qty, price, channel, eventId, shopId){
  var b=bookById(bookId);
  if(!b) return null;
  var cut=0;
  if(channel==="consign"){
    S.shops.forEach(function(sh){ if(sh.id===shopId) cut=num(sh.cut); });
  }
  var take = channel==="consign" ? price*(1-cut/100) : price;
  var sale={id:uid(), ts:Date.now(), bookId:bookId, title:b.title, format:b.format,
            qty:qty, price:price, take:take, cost:bookCost(b),
            channel:channel, eventId:eventId||null, shopId:shopId||null};
  if(channel==="consign"){
    setPlaced(shopId, bookId, placedQty(shopId,bookId)-qty);
  } else {
    b.copies=num(b.copies)-qty;
  }
  S.sales.push(sale); save();
  return sale;
}
function quickSale(bookId){
  var b=bookById(bookId);
  if(!b || num(b.copies)<=0) return;
  var s=makeSale(bookId,1,num(b.retail),"event",curEvent,null);
  render();
  toast("Sold "+b.title+" ("+shortFmt(b.format)+") — "+fmt(s.price), function(){ removeSale(s.id,true); });
}
function saleForm(bookId){
  var b=bookById(bookId);
  openSheet('<h2>'+esc(b.title)+'</h2><div class="sub">'+esc(b.format)+' — '+num(b.copies)+' in stock</div>'
    +'<label>Quantity</label><input id="s-qty" type="number" inputmode="numeric" min="1" step="1" value="1">'
    +'<label>Price per copy (what you actually charged)</label><input id="s-price" type="number" inputmode="decimal" min="0" step="0.01" value="'+num(b.retail).toFixed(2)+'">'
    +'<div class="row" style="margin-top:16px;"><button class="mini grow" onclick="dismissSheet()">Cancel</button>'
    +'<button class="bigbtn grow" style="margin:0;" onclick="saveSaleForm(\''+bookId+'\')">Log sale</button></div>');
}
function saveSaleForm(bookId){
  var q=Math.max(1,Math.round(num($("s-qty").value))), p=num($("s-price").value);
  var b=bookById(bookId);
  if(q>num(b.copies)){ alert("You only have "+num(b.copies)+" in stock."); return; }
  var s=makeSale(bookId,q,p,"event",curEvent,null);
  dismissSheet(); render();
  toast("Sold "+q+" × "+b.title+" — "+fmt(q*p), function(){ removeSale(s.id,true); });
}
function removeSale(id, silent){
  var idx=-1;
  S.sales.forEach(function(s,i){ if(s.id===id) idx=i; });
  if(idx<0) return;
  var s=S.sales[idx];
  var b=bookById(s.bookId);
  if(s.channel==="consign"){
    if(b) setPlaced(s.shopId, s.bookId, placedQty(s.shopId,s.bookId)+s.qty);
  } else if(b){
    b.copies=num(b.copies)+s.qty;
  }
  S.sales.splice(idx,1); save(); render();
  if(!silent) hideToast();
}

/* ================= GIVEAWAYS ================= */
function rGive(){
  var n=S.giveaways.reduce(function(s,g){ return s+g.qty; },0);
  var cost=S.giveaways.reduce(function(s,g){ return s+g.qty*g.cost; },0);
  var h='<div class="statline">'+n+' copies given away · promo cost '+fmt(cost)+'</div>'
    +'<button class="bigbtn" onclick="giveForm()">＋ Log a giveaway</button>';
  if(!S.giveaways.length) h+='<div class="sub">ARCs, raffle prizes, review copies — log them here so your stock and promo spend stay honest.</div>';
  S.giveaways.slice().reverse().forEach(function(g){
    var evName="";
    S.events.forEach(function(e){ if(e.id===g.eventId) evName=e.name; });
    h+='<div class="saleline"><div class="grow">'+esc(g.title)+' <span class="tiny">'+esc(shortFmt(g.format))+'</span>'
      +'<div class="tiny">'+g.qty+' cop'+(g.qty===1?'y':'ies')+(g.note?' · '+esc(g.note):'')+(evName?' · '+esc(evName):'')+'</div></div>'
      +'<span class="sub">cost '+fmt(g.qty*g.cost)+'</span>'
      +'<button class="x" onclick="removeGive(\''+g.id+'\')">✕</button></div>';
  });
  $("v-give").innerHTML=h;
}
function bookOptions(filterFn){
  var books=S.books.slice().reverse(); // newest first
  var h="";
  books.forEach(function(b){
    if(filterFn && !filterFn(b)) return;
    h+='<option value="'+b.id+'">'+esc(b.title)+' — '+esc(b.format)+' ('+num(b.copies)+' in stock)</option>';
  });
  return h;
}
function giveForm(eventId){
  var evOpts='<option value="">— none —</option>';
  S.events.slice().sort(function(a,b){ return (b.date||"").localeCompare(a.date||""); }).forEach(function(e){
    evOpts+='<option value="'+e.id+'"'+(e.id===eventId?' selected':'')+'>'+esc(e.name)+' ('+fmtDate(e.date)+')</option>';
  });
  openSheet('<h2>Log a giveaway</h2>'
    +'<label>Book</label><select id="g-book">'+bookOptions(function(b){ return num(b.copies)>0; })+'</select>'
    +'<label>Copies</label><input id="g-qty" type="number" inputmode="numeric" min="1" step="1" value="1">'
    +'<label>Reason (optional)</label><input id="g-note" placeholder="ARC, raffle, reviewer…">'
    +'<label>Event tag (optional)</label><select id="g-event">'+evOpts+'</select>'
    +'<div class="row" style="margin-top:16px;"><button class="mini grow" onclick="dismissSheet()">Cancel</button>'
    +'<button class="bigbtn grow" style="margin:0;" onclick="saveGive()">Log it</button></div>');
}
function saveGive(){
  var bid=$("g-book").value, b=bookById(bid);
  if(!b){ alert("Pick a book (it needs copies in stock)."); return; }
  var q=Math.max(1,Math.round(num($("g-qty").value)));
  if(q>num(b.copies)){ alert("You only have "+num(b.copies)+" in stock."); return; }
  b.copies=num(b.copies)-q;
  var g={id:uid(), ts:Date.now(), bookId:bid, title:b.title, format:b.format,
         qty:q, cost:bookCost(b), note:$("g-note").value.trim(), eventId:$("g-event").value||null};
  S.giveaways.push(g); save(); dismissSheet(); render();
  toast("Gave away "+q+" × "+b.title, function(){ removeGive(g.id,true); });
}
function removeGive(id, silent){
  var idx=-1;
  S.giveaways.forEach(function(g,i){ if(g.id===id) idx=i; });
  if(idx<0) return;
  var g=S.giveaways[idx], b=bookById(g.bookId);
  if(b) b.copies=num(b.copies)+g.qty;
  S.giveaways.splice(idx,1); save(); render();
  if(!silent) hideToast();
}

/* ================= CONSIGNMENT ================= */
function rConsign(){
  var h='<button class="bigbtn" onclick="shopForm()">＋ Add a shop</button>';
  if(!S.shops.length) h+='<div class="sub">Add the shops that carry your books on consignment. Set the store’s cut once; the math is handled.</div>';
  S.shops.forEach(function(sh){
    var placed=S.placements.filter(function(p){ return p.shopId===sh.id; });
    var atShop=placed.reduce(function(s,p){ return s+p.qty; },0);
    var sales=S.sales.filter(function(s){ return s.shopId===sh.id; });
    var sold=sales.reduce(function(s,x){ return s+x.qty; },0);
    var take=sales.reduce(function(s,x){ return s+x.qty*x.take; },0);
    h+='<div class="card"><div class="row"><div class="grow"><b class="serif" style="font-size:18px;">'+esc(sh.name)+'</b>'
      +'<div class="sub">store keeps '+num(sh.cut)+'%</div></div>'
      +'<button class="mini" onclick="shopForm(\''+sh.id+'\')">Edit</button></div>';
    if(placed.length){
      placed.forEach(function(p){
        var b=bookById(p.bookId);
        if(!b) return;
        h+='<div class="saleline"><div class="grow">'+esc(b.title)+' <span class="tiny">'+esc(shortFmt(b.format))+'</span></div>'
          +'<b>'+p.qty+' there</b></div>';
      });
    } else {
      h+='<div class="tiny" style="padding:8px 0;">No copies at this shop right now.</div>';
    }
    h+='<div class="sub" style="margin:8px 0;">Sold here: <b>'+sold+'</b> · your take: <b style="color:var(--gold)">'+fmt(take)+'</b></div>'
      +'<div class="row">'
      +'<button class="mini grow" onclick="placeForm(\''+sh.id+'\')">Place copies</button>'
      +'<button class="mini grow" onclick="consignSaleForm(\''+sh.id+'\')">Record sold</button>'
      +'<button class="mini grow" onclick="returnForm(\''+sh.id+'\')">Return</button>'
      +'</div></div>';
  });
  $("v-consign").innerHTML=h;
}
function shopForm(id){
  var sh=null;
  S.shops.forEach(function(s){ if(s.id===id) sh=s; });
  openSheet('<h2>'+(sh?'Edit shop':'Add a shop')+'</h2>'
    +'<label>Shop name</label><input id="sh-name" value="'+(sh?esc(sh.name):'')+'" placeholder="e.g. Tombolo Books">'
    +'<label>Store’s cut (%) — what they keep</label><input id="sh-cut" type="number" inputmode="numeric" min="0" max="99" step="1" value="'+(sh?num(sh.cut):40)+'">'
    +'<div class="row" style="margin-top:16px;"><button class="mini grow" onclick="dismissSheet()">Cancel</button>'
    +'<button class="bigbtn grow" style="margin:0;" onclick="saveShop(\''+(id||'')+'\')">Save</button></div>'
    +(sh?'<button class="danger" style="margin-top:14px;" onclick="deleteShop(\''+id+'\')">Delete shop (returns its copies to stock)</button>':''));
}
function saveShop(id){
  var n=$("sh-name").value.trim(), c=Math.min(99,Math.max(0,num($("sh-cut").value)));
  if(!n){ alert("The shop needs a name."); return; }
  if(id){
    S.shops.forEach(function(s){ if(s.id===id){ s.name=n; s.cut=c; } });
  } else {
    S.shops.push({id:uid(), name:n, cut:c});
  }
  save(); dismissSheet(); render();
}
function deleteShop(id){
  if(!confirm("Delete this shop? Copies still there go back into your stock; its past sales stay in the ledger.")) return;
  S.placements.filter(function(p){ return p.shopId===id; }).forEach(function(p){
    var b=bookById(p.bookId);
    if(b) b.copies=num(b.copies)+p.qty;
  });
  S.placements=S.placements.filter(function(p){ return p.shopId!==id; });
  S.shops=S.shops.filter(function(s){ return s.id!==id; });
  save(); dismissSheet(); render();
}
function placeForm(shopId){
  openSheet('<h2>Place copies</h2>'
    +'<label>Book</label><select id="p-book">'+bookOptions(function(b){ return num(b.copies)>0; })+'</select>'
    +'<label>Copies to place</label><input id="p-qty" type="number" inputmode="numeric" min="1" step="1" value="1">'
    +'<div class="row" style="margin-top:16px;"><button class="mini grow" onclick="dismissSheet()">Cancel</button>'
    +'<button class="bigbtn grow" style="margin:0;" onclick="savePlace(\''+shopId+'\')">Place</button></div>');
}
function savePlace(shopId){
  var b=bookById($("p-book").value);
  if(!b){ alert("Pick a book with copies in stock."); return; }
  var q=Math.max(1,Math.round(num($("p-qty").value)));
  if(q>num(b.copies)){ alert("You only have "+num(b.copies)+" in stock."); return; }
  b.copies=num(b.copies)-q;
  setPlaced(shopId, b.id, placedQty(shopId,b.id)+q);
  save(); dismissSheet(); render();
}
function shopBookOptions(shopId){
  var h="";
  S.placements.filter(function(p){ return p.shopId===shopId && p.qty>0; }).forEach(function(p){
    var b=bookById(p.bookId);
    if(b) h+='<option value="'+b.id+'">'+esc(b.title)+' — '+esc(b.format)+' ('+p.qty+' there)</option>';
  });
  return h;
}
function consignSaleForm(shopId){
  var opts=shopBookOptions(shopId);
  if(!opts){ alert("No copies at this shop yet — place some first."); return; }
  var sh=null; S.shops.forEach(function(s){ if(s.id===shopId) sh=s; });
  openSheet('<h2>Sold at '+esc(sh.name)+'</h2>'
    +'<label>Book</label><select id="c-book" onchange="cCalc(\''+shopId+'\')">'+opts+'</select>'
    +'<label>Copies sold</label><input id="c-qty" type="number" inputmode="numeric" min="1" step="1" value="1" oninput="cCalc(\''+shopId+'\')">'
    +'<label>Price per copy</label><input id="c-price" type="number" inputmode="decimal" min="0" step="0.01" oninput="cCalc(\''+shopId+'\')">'
    +'<div class="calc" id="c-calc"></div>'
    +'<div class="row" style="margin-top:16px;"><button class="mini grow" onclick="dismissSheet()">Cancel</button>'
    +'<button class="bigbtn grow" style="margin:0;" onclick="saveConsignSale(\''+shopId+'\')">Log sale</button></div>');
  var b=bookById($("c-book").value);
  if(b) $("c-price").value=num(b.retail).toFixed(2);
  cCalc(shopId);
}
function cCalc(shopId){
  var sh=null; S.shops.forEach(function(s){ if(s.id===shopId) sh=s; });
  var b=bookById($("c-book").value);
  if(b && !$("c-price").value) $("c-price").value=num(b.retail).toFixed(2);
  var q=Math.max(1,Math.round(num($("c-qty").value))), p=num($("c-price").value);
  var take=p*(1-num(sh.cut)/100)*q;
  $("c-calc").innerHTML="Shop keeps "+num(sh.cut)+"% — your take: <b>"+fmt(take)+"</b>";
}
function saveConsignSale(shopId){
  var b=bookById($("c-book").value);
  if(!b) return;
  var q=Math.max(1,Math.round(num($("c-qty").value))), p=num($("c-price").value);
  var there=placedQty(shopId,b.id);
  if(q>there){ alert("Only "+there+" copies are at this shop."); return; }
  var s=makeSale(b.id,q,p,"consign",null,shopId);
  dismissSheet(); render();
  toast("Logged "+q+" sold — your take "+fmt(q*s.take), function(){ removeSale(s.id,true); });
}
function returnForm(shopId){
  var opts=shopBookOptions(shopId);
  if(!opts){ alert("No copies at this shop to return."); return; }
  openSheet('<h2>Return copies to stock</h2>'
    +'<label>Book</label><select id="r-book">'+opts+'</select>'
    +'<label>Copies coming back</label><input id="r-qty" type="number" inputmode="numeric" min="1" step="1" value="1">'
    +'<div class="row" style="margin-top:16px;"><button class="mini grow" onclick="dismissSheet()">Cancel</button>'
    +'<button class="bigbtn grow" style="margin:0;" onclick="saveReturn(\''+shopId+'\')">Return</button></div>');
}
function saveReturn(shopId){
  var b=bookById($("r-book").value);
  if(!b) return;
  var q=Math.max(1,Math.round(num($("r-qty").value)));
  var there=placedQty(shopId,b.id);
  if(q>there){ alert("Only "+there+" copies are at this shop."); return; }
  setPlaced(shopId,b.id,there-q);
  b.copies=num(b.copies)+q;
  save(); dismissSheet(); render();
}

/* ================= LEDGER ================= */
function rLedger(){
  var sold=0, rev=0, cogs=0;
  S.sales.forEach(function(s){ sold+=s.qty; rev+=s.qty*s.take; cogs+=s.qty*s.cost; });
  var profit=rev-cogs;
  var inStock=S.books.reduce(function(s,b){ return s+num(b.copies); },0);
  var stockVal=S.books.reduce(function(s,b){ return s+num(b.copies)*bookCost(b); },0);
  var atShops=S.placements.reduce(function(s,p){ return s+p.qty; },0);
  var given=S.giveaways.reduce(function(s,g){ return s+g.qty; },0);
  var promo=S.giveaways.reduce(function(s,g){ return s+g.qty*g.cost; },0);

  function stat(n,l){ return '<div class="stat"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>'; }
  var h='<div class="grid2">'
    +stat(sold,"copies sold")+stat(fmt(rev),"revenue (your take)")
    +stat('<span style="color:'+(profit>=0?'var(--green)':'var(--red)')+'">'+fmt(profit)+'</span>',"profit")+stat(fmt(cogs),"cost of goods sold")
    +stat(inStock,"copies in stock")+stat(fmt(stockVal),"stock value (at cost)")
    +stat(atShops,"at consignment shops")+stat(given+' / '+fmt(promo),"given away / promo cost")
    +'</div>';

  /* by book */
  var byBook={}, bOrder=[];
  S.sales.forEach(function(s){
    var k=s.title;
    if(!byBook[k]){ byBook[k]={sold:0,rev:0,cogs:0}; bOrder.push(k); }
    byBook[k].sold+=s.qty; byBook[k].rev+=s.qty*s.take; byBook[k].cogs+=s.qty*s.cost;
  });
  bOrder.sort(function(a,b){ return byBook[b].rev-byBook[a].rev; });
  if(bOrder.length){
    h+='<div class="secthead serif">By book</div><table><tr><th>Title</th><th class="r">Sold</th><th class="r">Revenue</th><th class="r">Profit</th></tr>';
    bOrder.forEach(function(k){
      var x=byBook[k];
      h+='<tr><td>'+esc(k)+'</td><td class="r">'+x.sold+'</td><td class="r">'+fmt(x.rev)+'</td><td class="r">'+fmt(x.rev-x.cogs)+'</td></tr>';
    });
    h+='</table>';
  }

  /* by event */
  var evRows="";
  S.events.slice().sort(function(a,b){ return (b.date||"").localeCompare(a.date||""); }).forEach(function(ev){
    var ss=S.sales.filter(function(s){ return s.eventId===ev.id; });
    if(!ss.length) return;
    var n=ss.reduce(function(s,x){ return s+x.qty; },0);
    var r=ss.reduce(function(s,x){ return s+x.qty*x.take; },0);
    var c=ss.reduce(function(s,x){ return s+x.qty*x.cost; },0);
    evRows+='<tr><td>'+esc(ev.name)+'<div class="tiny">'+fmtDate(ev.date)+'</div></td><td class="r">'+n+'</td><td class="r">'+fmt(r)+'</td><td class="r">'+fmt(r-c)+'</td></tr>';
  });
  if(evRows) h+='<div class="secthead serif">By event</div><table><tr><th>Event</th><th class="r">Sold</th><th class="r">Revenue</th><th class="r">Profit</th></tr>'+evRows+'</table>';

  /* by shop */
  var shRows="";
  S.shops.forEach(function(sh){
    var ss=S.sales.filter(function(s){ return s.shopId===sh.id; });
    var n=ss.reduce(function(s,x){ return s+x.qty; },0);
    var t=ss.reduce(function(s,x){ return s+x.qty*x.take; },0);
    var there=S.placements.filter(function(p){ return p.shopId===sh.id; }).reduce(function(s,p){ return s+p.qty; },0);
    if(!n && !there) return;
    shRows+='<tr><td>'+esc(sh.name)+'</td><td class="r">'+there+'</td><td class="r">'+n+'</td><td class="r">'+fmt(t)+'</td></tr>';
  });
  if(shRows) h+='<div class="secthead serif">By consignment shop</div><table><tr><th>Shop</th><th class="r">There</th><th class="r">Sold</th><th class="r">Your take</th></tr>'+shRows+'</table>';

  /* data tools */
  h+='<div class="secthead serif">Your data</div>'
    +'<button class="bigbtn" onclick="exportBackup()">⬇ Export backup (JSON)</button>'
    +'<button class="ghost" style="margin-bottom:10px;" onclick="exportCSV()">Export sales as CSV</button>'
    +'<button class="ghost" style="margin-bottom:10px;" onclick="$(\'restoreFile\').click()">Restore from a backup file</button>'
    +'<button class="ghost" style="margin-bottom:10px;" onclick="copyBackup()">Copy backup text to clipboard</button>'
    +'<button class="danger" onclick="eraseAll()">Erase all data</button>'
    +'<div class="tiny" style="margin-top:10px;">Tip: export a backup after every event. The file lands in your Files app (or share sheet) — save it somewhere safe like iCloud or email it to yourself.</div>';
  $("v-ledger").innerHTML=h;
}

/* ================= data tools ================= */
function today(){ return new Date().toISOString().slice(0,10); }
function download(name, text, type){
  try{
    var blob=new Blob([text],{type:type||"application/json"});
    var a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=name;
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); },800);
    toast("Exported "+name);
  }catch(e){
    alert("Download didn’t work in this browser. Use “Copy backup text to clipboard” instead.");
  }
}
function exportBackup(){
  download("book-racket-backup-"+today()+".json", JSON.stringify(S,null,1), "application/json");
}
function copyBackup(){
  var txt=JSON.stringify(S);
  function fallback(){
    openSheet('<h2>Backup text</h2><div class="sub">Select all, copy, and paste it somewhere safe (Notes, email to yourself).</div>'
      +'<textarea style="width:100%;height:220px;margin-top:10px;">'+esc(txt)+'</textarea>'
      +'<button class="bigbtn" style="margin-top:12px;" onclick="dismissSheet()">Done</button>');
  }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){ toast("Backup copied — paste it into Notes or an email."); }, fallback);
  } else fallback();
}
function csvEsc(v){ v=String(v==null?"":v); return '"'+v.replace(/"/g,'""')+'"'; }
function exportCSV(){
  var rows=[["date","channel","event_or_shop","title","format","qty","price_per_copy","your_take_per_copy","cost_per_copy","revenue","profit"]];
  S.sales.forEach(function(s){
    var where="";
    if(s.eventId) S.events.forEach(function(e){ if(e.id===s.eventId) where=e.name+" ("+e.date+")"; });
    if(s.shopId) S.shops.forEach(function(sh){ if(sh.id===s.shopId) where=sh.name; });
    rows.push([new Date(s.ts).toISOString().slice(0,10), s.channel==="consign"?"consignment":"event", where,
      s.title, s.format, s.qty, s.price.toFixed(2), s.take.toFixed(2), s.cost.toFixed(2),
      (s.qty*s.take).toFixed(2), (s.qty*(s.take-s.cost)).toFixed(2)]);
  });
  var csv=rows.map(function(r){ return r.map(csvEsc).join(","); }).join("\r\n");
  download("book-racket-sales-"+today()+".csv", csv, "text/csv");
}
function eraseAll(){
  if(!confirm("Erase EVERYTHING — books, sales, events, shops? Export a backup first!")) return;
  if(!confirm("Last chance. Really erase all data?")) return;
  S=seed(); save(); render();
  toast("Everything erased. Fresh start.");
}
$("restoreFile").addEventListener("change", function(){
  var f=this.files[0];
  this.value="";
  if(!f) return;
  var rd=new FileReader();
  rd.onload=function(){
    try{
      var d=JSON.parse(rd.result);
      if(!d || !Array.isArray(d.books)) throw 0;
      if(!confirm("Replace everything on this phone with the backup ("+d.books.length+" book entries, "+(d.sales||[]).length+" sales)?")) return;
      S=d;
      S.events=S.events||[]; S.shops=S.shops||[]; S.placements=S.placements||[];
      S.sales=S.sales||[]; S.giveaways=S.giveaways||[];
      save(); render();
      toast("Backup restored.");
    }catch(e){ alert("That file doesn’t look like a Book Racket backup."); }
  };
  rd.readAsText(f);
});

/* ================= boot ================= */
selfTest();
load();
go("books");
</script>
</body>
</html>
